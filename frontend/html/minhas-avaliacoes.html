<!DOCTYPE html>
<html lang="pt">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>AvaliaDocente</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
	<link rel="stylesheet" href="../css/variables.css">
	<link rel="stylesheet" href="../css/global.css">
	<link rel="stylesheet" href="../css/dashboard.css?v=20260530-10">
	<link rel="stylesheet" href="../css/pages.css?v=20260530-11">
	<link rel="stylesheet" href="../css/components/sidebar.css?v=20260530-9">
	<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
	<div class="dashboard-container">
		<div id="sidebar-root"></div>

		<main class="dashboard-main">
			<header class="dash-header">
				<div class="welcome-text">
					<h1 id="dashboardGreeting">Olá</h1>
					<p class="header-security"><strong>Ambiente seguro e anônimo.</strong> Suas respostas são confidenciais e não podem ser rastreadas.</p>
				</div>
				<div class="header-actions">
					<button class="notification-btn" aria-label="Notificações">
						<i data-lucide="bell"></i>
					</button>
					<div class="user-profile">
						<div class="avatar">ES</div>
						<div class="user-info">
							<span class="user-name" id="dashboardUserName">Estudante</span>
							<span class="user-role">Estudante</span>
						</div>
						<i data-lucide="chevron-down" class="dropdown-icon"></i>
					</div>
				</div>
			</header>

			<section class="page-content">
				<div class="page-grid">
					<div class="page-card">
						<span class="section-label">Resumo</span>
						<h2 class="card-title">Indicadores rápidos</h2>
						<div class="stat-grid" style="margin-top:18px;">
							<div class="stat-card"><span class="muted">Avaliações enviadas</span><strong id="totalAvaliacoes">--</strong></div>
							<div class="stat-card"><span class="muted">Média geral</span><strong id="mediaAvaliacoes">--</strong></div>
							<div class="stat-card"><span class="muted">Última atualização</span><strong id="ultimaAtualizacao">--</strong></div>
						</div>
					</div>

					<div class="page-card">
						<span class="section-label">Histórico recente</span>
						<h2 class="card-title">Avaliações registradas</h2>
						<div class="inline-list" id="minhasAvaliacoesLista" style="margin-top:18px;"></div>
					</div>
				</div>
			</section>
		</main>
	</div>

	<script src="../js/i18n.js?v=20260530-14"></script>
	<script src="../js/include-sidebar.js?v=20260530-10"></script>
    
	<script src="../js/api/avaliacao-api.js"></script>
	<script src="../js/minhas-avaliacoes.js"></script>
	<script src="../js/dashboard.js?v=20260530-11"></script>
</body>
</html>
