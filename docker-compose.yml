services:

  app:
    image: php:8.2-apache

    container_name: sistema_avaliacao_app

    restart: always

    ports:
      - "8080:80"

    volumes:
      - ./:/var/www/html

    working_dir: /var/www/html

    command: >
      bash -c "
      docker-php-ext-install pdo pdo_mysql mysqli &&
      a2enmod rewrite &&
      apache2-foreground
      "

    depends_on:
      - mysql

  mysql:
    image: mysql:8.0

    container_name: sistema_avaliacao_mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: avaliadocente

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin

    container_name: sistema_avaliacao_phpmyadmin

    restart: always

    ports:
      - "8081:80"

    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root

    depends_on:
      - mysql

volumes:
  mysql_data:
