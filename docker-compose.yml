services:
  app:
    image: php:8.2-apache
    container_name: sistema_avaliacao_app
    restart: always

    ports:
      - "8081:80"

    volumes:
      - ./:/var/www/html
      - ./docker/apache/000-default.conf:/etc/apache2/sites-available/000-default.conf

    working_dir: /var/www/html

    command: >
      bash -c "
      docker-php-ext-install pdo pdo_mysql mysqli &&
      a2enmod rewrite &&
      a2ensite 000-default.conf &&
      apache2-foreground
      "

    depends_on:
      - mysql


  mysql:
    image: mysql:8.0
    container_name: sistema_avaliacao_mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: avaliadocente
      MYSQL_USER: usuario
      MYSQL_PASSWORD: senha

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - ./backend/database/seeds.sql:/docker-entrypoint-initdb.d/seeds.sql:ro
      - ./backend/database/mysql.cnf:/etc/mysql/conf.d/mysql.cnf:ro


  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: sistema_avaliacao_phpmyadmin
    restart: always

    ports:
      - "8082:80"

    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root

    depends_on:
      - mysql


volumes:
  mysql_data: